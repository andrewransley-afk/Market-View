<!DOCTYPE html>
<html>
<head>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 320px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #001a30;
      color: #e8dcc8;
      padding: 20px;
    }
    h2 {
      color: #f6bd49;
      font-size: 15px;
      margin-bottom: 12px;
      text-align: center;
    }
    label {
      display: block;
      font-size: 12px;
      color: #a0a8b4;
      margin-bottom: 4px;
    }
    input {
      width: 100%;
      padding: 8px 10px;
      border: 1px solid #083861;
      border-radius: 6px;
      background: #002a4e;
      color: #e8dcc8;
      font-size: 13px;
      margin-bottom: 14px;
    }
    input:focus { outline: none; border-color: #f6bd49; }
    button {
      width: 100%;
      padding: 10px;
      border: none;
      border-radius: 6px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.2s;
    }
    button:hover { opacity: 0.9; }
    #send-btn {
      background: #f6bd49;
      color: #001a30;
    }
    #send-btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }
    #status {
      margin-top: 12px;
      font-size: 12px;
      text-align: center;
      min-height: 16px;
    }
    .success { color: #66bbb0; }
    .error { color: #cf2e2e; }
    .info { color: #a0a8b4; }
    .step {
      font-size: 12px;
      color: #a0a8b4;
      margin-bottom: 14px;
      line-height: 1.5;
    }
    .step strong { color: #e8dcc8; }
    a { color: #8cd0e5; }
  </style>
</head>
<body>
  <h2>Market View</h2>

  <label>Dashboard URL</label>
  <input type="text" id="server-url" placeholder="https://market-view-jcv5.onrender.com" />

  <div class="step">
    <strong>1.</strong> <a href="https://rate-checker.internalapps.holidayextras.com/#/galaxyConnect/getProductAvailability?isTestEnvironment=false&supplierId=abe869be-e545-4e59-ab86-211e4f776642" target="_blank">Open Rate Checker</a> and sign in<br>
    <strong>2.</strong> Click the button below to send cookies
  </div>

  <button id="send-btn">Send HX Cookies</button>
  <div id="status"></div>

  <script src="popup.js"></script>
</body>
</html>
