<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Market View - Pricing Intelligence</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700;900&family=Lora:ital,wght@0,400;0,600;0,700;1,400&display=swap" rel="stylesheet">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.2/html2pdf.bundle.min.js"></script>
  <style>
    @font-face {
      font-family: "Harry Beast";
      src: url("/harry-beast.woff2") format("woff2");
      font-weight: 400;
      font-style: normal;
      font-display: swap;
    }
  </style>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --navy-dark: #001a30;
      --navy: #002a4e;
      --navy-mid: #083861;
      --blue: #005789;
      --blue-light: #8cd0e5;
      --gold: #f6bd49;
      --gold-dark: #dfaa3e;
      --teal: #66bbb0;
      --grey-light: #f2f2f2;
      --text-light: #c8dce8;
      --text-muted: #7a9bb5;
    }

    body {
      font-family: "Lora", Georgia, serif;
      background: var(--navy-dark);
      color: var(--text-light);
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* Hero banner with dark cinematic overlay */
    .hero-banner {
      background:
        linear-gradient(180deg, rgba(0,26,48,0.3) 0%, rgba(0,26,48,0.95) 100%),
        url('https://www.wbstudiotour.co.uk/wp-content/uploads/2019/06/Hogwarts-Castle-Model.jpg') center/cover no-repeat;
      padding: 50px 20px 40px;
      text-align: center;
      position: relative;
    }

    /* Flourish SVG dividers - inspired by the WB site's decorative elements */
    .flourish {
      display: block;
      margin: 0 auto;
      opacity: 0.5;
    }

    h1 {
      font-family: "Harry Beast", "Cinzel Decorative", serif;
      font-size: 56px;
      font-weight: 400;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: #fff;
      text-shadow: 0 2px 30px rgba(0,0,0,0.5);
      margin-bottom: 2px;
      line-height: 1.1;
    }

    .subtitle {
      font-family: "Harry Beast", "Cinzel Decorative", serif;
      font-size: 15px;
      letter-spacing: 6px;
      text-transform: uppercase;
      color: var(--blue-light);
      font-weight: 400;
    }

    .last-updated {
      color: var(--text-muted);
      font-size: 13px;
      font-style: italic;
      margin-top: 16px;
    }

    .scrape-checklist {
      margin-top: 16px;
      display: inline-block;
      text-align: left;
      font-family: "Lora", serif;
      font-size: 13px;
      color: var(--parchment);
    }
    .scrape-checklist-item {
      padding: 4px 0;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .scrape-checklist-item .icon {
      width: 18px;
      text-align: center;
      font-size: 14px;
    }
    .check-pending .icon { color: var(--text-muted); }
    .check-running .icon { color: var(--gold); }
    .check-done .icon { color: var(--teal); }
    .check-failed .icon { color: #cf2e2e; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .spinner { display: inline-block; animation: spin 1s linear infinite; }

    .scrape-btn {
      display: inline-block;
      margin-top: 18px;
      padding: 12px 32px;
      font-family: "Lora", serif;
      font-size: 14px;
      font-weight: 700;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: #000;
      background: var(--gold);
      border: none;
      border-radius: 0;
      cursor: pointer;
      transition: background 0.2s;
      position: relative;
    }
    .scrape-btn:hover { background: var(--gold-dark); }
    .scrape-btn:active { transform: translateY(1px); }
    .scrape-btn:disabled {
      background: var(--text-muted);
      color: var(--navy);
      cursor: not-allowed;
    }
    /* Ticket-stub notches on button */
    .scrape-btn::before, .scrape-btn::after {
      content: "";
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      width: 10px;
      height: 10px;
      background: var(--navy-dark);
      border-radius: 50%;
    }
    .scrape-btn::before { left: -5px; }
    .scrape-btn::after { right: -5px; }

    .container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 0 20px 40px;
    }

    /* Alert banner */
    .alert-banner {
      background: var(--navy-mid);
      border-left: 4px solid var(--gold);
      padding: 16px 24px;
      margin: 24px 0;
      font-size: 16px;
      font-weight: 600;
      color: var(--gold);
      letter-spacing: 0.5px;
    }
    .alert-banner.urgent {
      border-color: #cf2e2e;
      color: #ff7b6b;
      background: linear-gradient(90deg, rgba(207,46,46,0.12), var(--navy-mid));
    }
    .alert-banner.clear {
      border-color: var(--teal);
      color: var(--teal);
    }

    /* Stats row */
    .stats-row {
      display: flex;
      gap: 1px;
      margin-bottom: 24px;
      background: rgba(0,0,0,0.2);
    }
    .stat-card {
      flex: 1;
      background: var(--navy);
      padding: 20px 16px;
      text-align: center;
      transition: background 0.2s;
    }
    .stat-card:hover { background: var(--navy-mid); }
    .stat-value {
      font-family: "Harry Beast", "Cinzel Decorative", serif;
      font-size: 32px;
      font-weight: 400;
      color: var(--gold);
    }
    .stat-label {
      font-size: 11px;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 3px;
      margin-top: 6px;
    }

    /* Heading flourish (mimics WB site section headings) */
    .section-heading {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 16px;
      margin: 28px 0 16px;
    }
    .section-heading span {
      font-family: "Harry Beast", "Cinzel Decorative", serif;
      font-size: 16px;
      font-weight: 400;
      letter-spacing: 4px;
      text-transform: uppercase;
      color: var(--blue-light);
      white-space: nowrap;
    }
    .section-heading::before, .section-heading::after {
      content: "";
      flex: 1;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--blue), transparent);
    }

    /* Table */
    .table-wrapper {
      background: var(--navy);
      overflow: auto;
      max-height: 70vh;
      box-shadow: 0 4px 30px rgba(0,0,0,0.4);
    }

    table { width: 100%; border-collapse: collapse; table-layout: fixed; }

    th {
      background: var(--navy-mid);
      color: var(--blue-light);
      padding: 14px 16px;
      text-align: center;
      font-family: "Lora", serif;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 3px;
      text-transform: uppercase;
      border-bottom: 2px solid rgba(0,87,137,0.4);
      position: sticky;
      top: 0;
      z-index: 2;
    }

    td {
      padding: 11px 16px;
      border-bottom: 1px solid rgba(0,87,137,0.15);
      font-size: 14px;
      color: var(--text-light);
      text-align: center;
    }

    tr { transition: background 0.2s; }
    tr:hover { background: rgba(0,87,137,0.1); }

    /* Raise row - gold left accent */
    tr.raise-row {
      background: linear-gradient(90deg, rgba(246,189,73,0.08), transparent);
    }
    tr.raise-row:hover {
      background: linear-gradient(90deg, rgba(246,189,73,0.15), rgba(0,87,137,0.08));
    }
    tr.raise-row td:first-child {
      box-shadow: inset 3px 0 0 var(--gold);
    }

    .date-cell {
      font-weight: 600;
      color: #fff;
      white-space: nowrap;
    }

    /* Availability indicators */
    .dot {
      display: inline-block;
      width: 16px;
      height: 16px;
      border-radius: 50%;
      vertical-align: middle;
    }
    .dot.green {
      background: var(--teal);
      box-shadow: 0 0 8px rgba(102,187,176,0.4);
    }
    .dot.red {
      background: #cf2e2e;
      box-shadow: 0 0 8px rgba(207,46,46,0.4);
    }
    .dot.grey {
      background: #2a3a4a;
    }

    /* Urgent summary panel */
    .urgent-panel {
      background: linear-gradient(135deg, rgba(246,189,73,0.08), rgba(246,189,73,0.02));
      border: 1px solid rgba(246,189,73,0.3);
      border-left: 4px solid var(--gold);
      padding: 18px 24px;
      margin-bottom: 24px;
    }
    .urgent-panel h3 {
      font-family: "Harry Beast", "Cinzel Decorative", serif;
      font-size: 16px;
      font-weight: 400;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--gold);
      margin: 0 0 12px 0;
    }
    .urgent-dates {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }
    .urgent-date {
      background: var(--navy-mid);
      border: 1px solid rgba(246,189,73,0.25);
      padding: 8px 14px;
      font-size: 13px;
      color: #fff;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
    }
    .urgent-date:hover {
      background: var(--navy);
      border-color: var(--gold);
    }
    .urgent-date .yielded-tag {
      display: block;
      font-size: 9px;
      font-weight: 700;
      letter-spacing: 1px;
      text-transform: uppercase;
      color: var(--teal);
      margin-top: 3px;
    }
    .urgent-date .slow-tag {
      display: block;
      font-size: 9px;
      font-weight: 700;
      letter-spacing: 1px;
      text-transform: uppercase;
      color: #e74c3c;
      margin-top: 3px;
    }
    .urgent-date .stock-info {
      display: block;
      font-size: 11px;
      color: var(--gold);
      font-weight: 400;
      margin-top: 2px;
    }

    /* Recommendation badges */
    .rec-badge {
      display: inline-block;
      font-family: "Lora", serif;
      font-weight: 700;
      font-size: 11px;
      letter-spacing: 1px;
      text-transform: uppercase;
      padding: 5px 12px;
      white-space: normal;
      max-width: 120px;
      line-height: 1.3;
    }
    .rec-wb-low {
      background: #ff6900;
      color: #000;
    }
    .rec-yield {
      background: var(--gold);
      color: #000;
    }
    .rec-wb-sold-out {
      background: #cf2e2e;
      color: #fff;
    }
    .rec-hold {
      color: var(--text-muted);
      font-size: 12px;
      font-style: italic;
    }

    /* Stock number styling */
    .stock-high { color: var(--teal); font-weight: 700; }
    .stock-med { color: var(--gold); font-weight: 700; }
    .stock-low { color: #cf2e2e; font-weight: 700; }
    .stock-zero { color: #2a3a4a; }

    /* Trend indicators */
    .stock-wrap {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 0;
    }
    .stock-wrap .stock-num {
      display: inline-block;
      width: 30px;
      text-align: right;
    }
    .stock-wrap .trend-slot {
      display: inline-block;
      width: 30px;
      text-align: left;
      padding-left: 4px;
    }

    .trend {
      font-size: 11px;
      margin-left: 0;
      font-weight: 400;
    }
    .trend-down { color: #cf2e2e; }
    .trend-up { color: var(--teal); }
    .trend-flat { color: var(--text-muted); }

    /* Clickable rows */
    tr[data-date] { cursor: pointer; }

    /* Modal */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,10,20,0.85);
      z-index: 100;
      display: flex;
      align-items: center;
      justify-content: center;
      animation: fade-in 0.2s;
    }
    @keyframes fade-in { from { opacity: 0; } to { opacity: 1; } }

    .modal {
      background: var(--navy);
      border: 1px solid rgba(0,87,137,0.4);
      width: 90%;
      max-width: 800px;
      max-height: 90vh;
      overflow-y: auto;
      box-shadow: 0 8px 60px rgba(0,0,0,0.6);
      position: relative;
    }
    .modal-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 20px 24px;
      border-bottom: 1px solid rgba(0,87,137,0.3);
    }
    .modal-header h2 {
      font-family: "Harry Beast", "Cinzel Decorative", serif;
      font-size: 22px;
      font-weight: 400;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: #fff;
      margin: 0;
    }
    .modal-close {
      background: none;
      border: none;
      color: var(--text-muted);
      font-size: 28px;
      cursor: pointer;
      padding: 0 4px;
      line-height: 1;
    }
    .modal-close:hover { color: #fff; }

    .modal-body { padding: 24px; }

    .chart-container {
      background: var(--navy-dark);
      border: 1px solid rgba(0,87,137,0.2);
      padding: 16px;
      margin-bottom: 20px;
    }
    .chart-container canvas {
      width: 100%;
      height: 250px;
    }
    .chart-legend {
      display: flex;
      gap: 20px;
      justify-content: center;
      margin-top: 12px;
      font-size: 12px;
    }
    .chart-legend span {
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .legend-dot {
      display: inline-block;
      width: 10px;
      height: 10px;
      border-radius: 50%;
    }

    .events-title {
      font-family: "Harry Beast", "Cinzel Decorative", serif;
      font-size: 14px;
      font-weight: 400;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--blue-light);
      margin-bottom: 12px;
    }
    .event-list { list-style: none; }
    .event-list li {
      padding: 8px 0;
      border-bottom: 1px solid rgba(0,87,137,0.1);
      font-size: 13px;
      display: flex;
      gap: 12px;
      align-items: center;
    }
    .event-date-label {
      color: var(--text-muted);
      min-width: 80px;
      font-size: 11px;
    }
    .event-badge {
      display: inline-block;
      padding: 2px 8px;
      font-size: 10px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1px;
    }
    .event-badge.sold-out { background: #cf2e2e; color: #fff; }
    .event-badge.back { background: var(--teal); color: #000; }
    .no-history {
      text-align: center;
      color: var(--text-muted);
      font-style: italic;
      padding: 40px;
    }

    .loading {
      text-align: center;
      padding: 100px 40px;
      font-family: "Cinzel Decorative", serif;
      font-size: 18px;
      color: var(--text-muted);
      letter-spacing: 4px;
    }

    .error {
      text-align: center;
      padding: 80px 40px;
      color: #cf2e2e;
      font-family: "Lora", serif;
      font-size: 16px;
    }

    .history-calendar {
      display: inline-block;
      background: var(--navy);
      border: 1px solid var(--blue);
      border-radius: 6px;
      padding: 16px;
      text-align: center;
    }
    .history-calendar .cal-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 10px;
      color: var(--gold);
      font-family: "Cinzel Decorative", serif;
      font-size: 14px;
    }
    .history-calendar .cal-nav {
      background: none;
      border: 1px solid var(--blue);
      color: var(--blue-light);
      cursor: pointer;
      padding: 4px 10px;
      font-size: 14px;
      border-radius: 3px;
    }
    .history-calendar .cal-nav:hover { background: var(--navy-mid); }
    .history-calendar .cal-grid {
      display: grid;
      grid-template-columns: repeat(7, 36px);
      gap: 2px;
      justify-content: center;
    }
    .history-calendar .cal-day-label {
      font-size: 10px;
      color: var(--text-muted);
      padding: 4px 0;
      text-transform: uppercase;
    }
    .history-calendar .cal-day {
      width: 36px;
      height: 36px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 12px;
      color: var(--text-muted);
      border-radius: 3px;
    }
    .history-calendar .cal-day.has-data {
      background: var(--navy-mid);
      color: var(--gold);
      cursor: pointer;
      font-weight: 700;
      border: 1px solid var(--blue);
    }
    .history-calendar .cal-day.has-data:hover {
      background: var(--blue);
      color: #fff;
    }
    .history-calendar .cal-day.selected {
      background: var(--gold);
      color: var(--navy-dark);
    }
    .history-calendar .cal-day.today {
      border: 1px solid var(--teal);
    }

    .price-tag {
      display: inline-block;
      background: var(--gold);
      color: var(--navy-dark);
      font-size: 10px;
      font-weight: 700;
      padding: 1px 5px;
      border-radius: 3px;
      margin-left: 4px;
      cursor: pointer;
      vertical-align: middle;
    }
    .price-tag:hover { background: var(--gold-dark); }
    .price-tag.price-up { background: var(--teal); color: #000; }
    .price-tag.price-down { background: #cf2e2e; color: #fff; }
    .impact-bar {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 3px 0;
      font-size: 12px;
    }
    .impact-bar .bar {
      height: 8px;
      border-radius: 4px;
      min-width: 2px;
    }
    .impact-bar .bar-hx { background: var(--gold); }
    .impact-bar .bar-wb { background: var(--blue-light); }

    .footer {
      text-align: center;
      margin-top: 30px;
      padding: 20px;
      color: #2a4a60;
      font-size: 12px;
      font-style: italic;
      letter-spacing: 2px;
    }

    /* Responsive */
    @media (max-width: 768px) {
      h1 { font-size: 28px; letter-spacing: 2px; }
      .stats-row { flex-wrap: wrap; }
      .stat-card { flex: 1 1 45%; }
      .stat-value { font-size: 24px; }
      td, th { padding: 8px 10px; font-size: 12px; }
    }
  </style>
</head>
<body>
  <div id="app">
    <div class="hero-banner">
      <div class="loading">Summoning Market Data...</div>
    </div>
  </div>

  <script>
    const COMPETITORS = [
      "WB Studio Tour Direct",
      "Golden Tours",
      "Booking.com",
      "Premium Tours",
      "GetYourGuide"
    ];

    const SHORT_NAMES = {
      "WB Studio Tour Direct": "WB Direct",
      "Golden Tours": "Golden",
      "Booking.com": "Booking",
      "Premium Tours": "Premium",
      "GetYourGuide": "GYG"
    };

    function formatDate(dateStr) {
      const d = new Date(dateStr + "T00:00:00");
      return d.toLocaleDateString("en-GB", {
        weekday: "short",
        day: "numeric",
        month: "short"
      });
    }

    function stockClass(stock) {
      if (stock === 0) return "stock-zero";
      if (stock <= 10) return "stock-low";
      if (stock <= 30) return "stock-med";
      return "stock-high";
    }

    function trendHTML(now, prev) {
      if (now === null || now === undefined || prev === null || prev === undefined) return "";
      const diff = now - prev;
      if (diff === 0) return "";
      const cls = diff < 0 ? "trend-down" : "trend-up";
      const arrow = diff < 0 ? "\u2193" : "\u2191";
      return `<span class="trend ${cls}">${arrow}${Math.abs(diff)}</span>`;
    }

    function render(data, lastUpdated) {
      const app = document.getElementById("app");
      const raiseCount = data.filter(d => d.recommendation !== "hold").length;
      const totalStock = data.reduce((sum, d) => sum + d.totalStock, 0);
      let bannerClass = "clear";
      let bannerText = "All clear \u2014 no pricing action needed today.";
      if (raiseCount > 0) {
        bannerClass = raiseCount >= 5 ? "urgent" : "";
        bannerText = `${raiseCount} date${raiseCount > 1 ? "s" : ""} ${raiseCount > 1 ? "need" : "needs"} attention`;
      }

      const updatedText = lastUpdated
        ? `Last updated: ${new Date(lastUpdated).toLocaleString("en-GB")}`
        : "No data yet \u2014 click Refresh Data to run a scrape";

      const rows = data.map(day => {
        const isAction = day.recommendation !== "hold";
        const competitorCells = COMPETITORS.map(name => {
          const comp = day.competitors.find(c => c.competitor === name);
          if (!comp) return '<td><span class="dot grey" title="No data"></span></td>';
          if (comp.tickets !== undefined && comp.tickets !== null) {
            if (comp.tickets === 0 && name === "WB Studio Tour Direct") {
              const wbT = day.wbTrend || {};
              const trend = trendHTML(comp.tickets, wbT.d1);
              return `<td><span class="stock-wrap"><span class="stock-num" style="color:#cf2e2e;font-weight:bold;font-size:1.1em" title="${name}: Sold Out">\u2716</span><span class="trend-slot">${trend}</span></span></td>`;
            }
            const cls = stockClass(comp.tickets);
            const wbT = day.wbTrend || {};
            const trend = trendHTML(comp.tickets, wbT.d1);
            return `<td><span class="stock-wrap"><span class="stock-num ${cls}" title="${name}: ${comp.tickets} tickets">${comp.tickets}</span><span class="trend-slot">${trend}</span></span></td>`;
          }
          return comp.available
            ? '<td><span class="dot green" title="' + name + ': Available"></span></td>'
            : '<td><span class="dot red" title="' + name + ': Sold Out"></span></td>';
        }).join("");

        const recMap = {
          "wb-low": { cls: "rec-badge rec-wb-low", text: "WB Low Stock" },
          "yield": { cls: "rec-badge rec-yield", text: "WB & Partner Sold Out" },
          "wb-sold-out": { cls: "rec-badge rec-wb-sold-out", text: "WB Sold Out" },
          "hold": { cls: "rec-hold", text: "Hold" }
        };

        <div class="container">
          <div class="alert-banner ${bannerClass}">${bannerText}</div>

          ${(() => {
            const yieldDates = data.filter(d => d.recommendation === "yield");

            sevenDaysAgo.setDate(sevenDaysAgo.getDate() - 7);

          <div style="margin-top:32px;text-align:center">
            <div style="font-family:'Cinzel Decorative',serif;color:var(--gold);font-size:16px;margin-bottom:12px">Historical View</div>
            <p style="color:var(--text-muted);font-size:12px;margin-bottom:14px">Select a date to see what the market looked like that day</p>
            <div id="history-calendar" class="history-calendar"></div>
            <div style="margin-top:8px">
              <button class="scrape-btn" id="clear-history-btn" style="margin-top:0;padding:8px 20px;font-size:11px;background:var(--text-muted);display:none" onclick="clearHistorical()">Back to Live</button>

    let historicalDatesSet = new Set();
    let calendarMonth = new Date().getMonth();
    let calendarYear = new Date().getFullYear();
    let selectedHistDate = null;

    async function loadHistoricalDates() {
      try {
        const dates = window.__STATIC_MODE__
          ? (window.__STATIC_DATA__.historicalDates || [])
          : await fetch("/api/historical-dates").then(r => r.json());
        historicalDatesSet = new Set(dates);
        renderCalendar();
      } catch {}
    }

    function renderCalendar() {
      const container = document.getElementById("history-calendar");
      if (!container) return;

      const monthNames = ["January","February","March","April","May","June","July","August","September","October","November","December"];
      const dayLabels = ["Mo","Tu","We","Th","Fr","Sa","Su"];

      const firstDay = new Date(calendarYear, calendarMonth, 1);
      const lastDay = new Date(calendarYear, calendarMonth + 1, 0);
      let startDay = firstDay.getDay() - 1;
      if (startDay < 0) startDay = 6;

      const today = new Date().toISOString().split("T")[0];

      let cells = dayLabels.map(d => `<div class="cal-day-label">${d}</div>`).join("");
      for (let i = 0; i < startDay; i++) {
        cells += '<div class="cal-day"></div>';
      }
      for (let d = 1; d <= lastDay.getDate(); d++) {
        const dateStr = `${calendarYear}-${String(calendarMonth+1).padStart(2,"0")}-${String(d).padStart(2,"0")}`;
        const hasData = historicalDatesSet.has(dateStr);
        const isToday = dateStr === today;
        const isSelected = dateStr === selectedHistDate;
        let cls = "cal-day";
        if (hasData) cls += " has-data";
        if (isToday) cls += " today";
        if (isSelected) cls += " selected";
        const onclick = hasData ? `onclick="selectHistoricalDate('${dateStr}')"` : "";
        cells += `<div class="${cls}" ${onclick}>${d}</div>`;
      }

      container.innerHTML = `
        <div class="cal-header">
          <button class="cal-nav" onclick="changeCalMonth(-1)">&lsaquo;</button>
          <span>${monthNames[calendarMonth]} ${calendarYear}</span>
          <button class="cal-nav" onclick="changeCalMonth(1)">&rsaquo;</button>
        </div>
        <div class="cal-grid">${cells}</div>
      `;
    }

    function changeCalMonth(dir) {
      calendarMonth += dir;
      if (calendarMonth > 11) { calendarMonth = 0; calendarYear++; }
      if (calendarMonth < 0) { calendarMonth = 11; calendarYear--; }
      renderCalendar();
    }
    window.changeCalMonth = changeCalMonth;

    function selectHistoricalDate(date) {
      selectedHistDate = date;
      renderCalendar();
      loadHistorical(date);
    }
    window.selectHistoricalDate = selectHistoricalDate;

        const rows = data.map(day => {

            if (val === 1) return '<td style="text-align:center"><span class="dot green" title="Available"></span></td>';
            return '<td style="text-align:center"><span class="dot red" title="Sold Out"></span></td>';
          }).join("");

          return `<tr>

        container.innerHTML = `
          <div style="font-family:'Cinzel Decorative',serif;color:var(--blue-light);font-size:14px;margin-bottom:10px">
            Snapshot from ${formatDate(date)}
          </div>
          <div class="table-wrapper">

                  <th>WB Direct</th>
                  <th>HX Stock</th>
                  <th>Golden Tours</th>

    async function showPriceImpact(dateStr) {
      const overlay = document.createElement("div");
      overlay.className = "modal-overlay";
      overlay.onclick = (e) => { if (e.target === overlay) overlay.remove(); };

      const dateLabel = new Date(dateStr + "T00:00:00").toLocaleDateString("en-GB", {
        weekday: "long", day: "numeric", month: "long", year: "numeric"
      });

      overlay.innerHTML = `
        <div class="modal">
          <div class="modal-header">
            <h2>Price Impact: ${dateLabel}</h2>
            <button class="modal-close" onclick="this.closest('.modal-overlay').remove()">&times;</button>
          </div>
          <div class="modal-body">
            <div class="no-history">Loading...</div>
          </div>
        </div>
      `;
      document.body.appendChild(overlay);

      const escHandler = (e) => {
        if (e.key === "Escape") { overlay.remove(); document.removeEventListener("keydown", escHandler); }
      };
      document.addEventListener("keydown", escHandler);

      try {
        const { priceChange, history, impact } = window.__STATIC_MODE__
          ? (window.__STATIC_DATA__.priceChangeDetail[dateStr] || { priceChange: null, history: [], impact: [] })
          : await fetch("/api/price-change/" + dateStr).then(r => r.json());
        const body = overlay.querySelector(".modal-body");

        if (!priceChange) {
          body.innerHTML = '<div class="no-history">No price change recorded for this date.</div>';
          return;
        }

        const increment = priceChange.newPrice;
        const sign = increment > 0 ? "+" : "";
        const incColor = increment > 0 ? "#cf2e2e" : "var(--teal)";

        let summaryHTML = `
          <div style="display:flex;gap:24px;flex-wrap:wrap;margin-bottom:16px">
            <div>
              <div style="font-size:11px;color:var(--text-muted)">Latest Change</div>
              <div style="font-size:18px;font-weight:700;color:${incColor}">
                ${sign}\u00A3${Math.abs(increment).toFixed(2)}
              </div>
            </div>
            <div>
              <div style="font-size:11px;color:var(--text-muted)">Changed On</div>
              <div style="font-size:14px">${formatDate(priceChange.changedDate)}</div>
            </div>
            ${priceChange.note ? `<div><div style="font-size:11px;color:var(--text-muted)">Note</div><div style="font-size:14px">${priceChange.note}</div></div>` : ""}
          </div>
          <div style="display:flex;gap:24px;flex-wrap:wrap;margin-bottom:16px">
            <div>
              <div style="font-size:11px;color:var(--text-muted)">HX Stock at Change</div>
              <div style="font-size:16px;font-weight:700" class="${stockClass(priceChange.hxStockAtChange || 0)}">${priceChange.hxStockAtChange ?? '-'}</div>
            </div>
            <div>
              <div style="font-size:11px;color:var(--text-muted)">WB Stock at Change</div>
              <div style="font-size:16px;font-weight:700" class="${stockClass(priceChange.wbStockAtChange || 0)}">${priceChange.wbStockAtChange ?? '-'}</div>
            </div>
          </div>
        `;

        // Price change history timeline
        let historyHTML = "";
        if (history && history.length > 1) {
          historyHTML = `
            <div style="border-top:1px solid var(--navy-mid);padding-top:12px;margin-bottom:16px">
              <div style="color:var(--gold);font-weight:700;font-size:13px;margin-bottom:10px">Change History (${history.length} changes)</div>
              <div style="display:flex;flex-direction:column;gap:0;position:relative;padding-left:16px">
                ${history.map((h, idx) => {
                  const inc = h.newPrice;
                  const s = inc > 0 ? "+" : "";
                  const c = inc > 0 ? "#cf2e2e" : inc < 0 ? "var(--teal)" : "var(--text-muted)";
                  const isLatest = idx === 0;
                  const dotSize = isLatest ? 10 : 8;
                  const dotColor = isLatest ? "var(--gold)" : "var(--text-muted)";
                  return `
                    <div style="display:flex;align-items:flex-start;gap:12px;padding-bottom:${idx < history.length - 1 ? '14' : '0'}px;position:relative">
                      <div style="position:absolute;left:-16px;top:3px;width:${dotSize}px;height:${dotSize}px;border-radius:50%;background:${dotColor};border:2px solid var(--navy-dark);z-index:1"></div>
                      ${idx < history.length - 1 ? '<div style="position:absolute;left:-12px;top:13px;bottom:0;width:2px;background:var(--navy-mid)"></div>' : ''}
                      <div style="flex:1">
                        <div style="display:flex;align-items:center;gap:10px;flex-wrap:wrap">
                          <span style="font-size:12px;color:${isLatest ? '#fff' : 'var(--text-muted)'};font-weight:${isLatest ? '700' : '400'}">${formatDate(h.changedDate)}</span>
                          <span style="font-size:13px;font-weight:700;color:${c}">${s}\u00A3${Math.abs(inc).toFixed(2)}</span>
                          ${isLatest ? '<span style="font-size:9px;background:var(--gold);color:var(--navy-dark);padding:1px 5px;border-radius:3px;font-weight:700">LATEST</span>' : ''}
                        </div>
                        ${h.note ? `<div style="font-size:11px;color:var(--text-muted);margin-top:2px">${h.note}</div>` : ''}
                        ${h.hxStockAtChange != null || h.wbStockAtChange != null ? `<div style="font-size:10px;color:var(--text-muted);margin-top:2px">HX: ${h.hxStockAtChange ?? '-'} &middot; WB: ${h.wbStockAtChange ?? '-'}</div>` : ''}
                      </div>
                    </div>
                  `;
                }).join("")}
              </div>
            </div>
          `;
        }

        let impactHTML = "";
        if (impact.length > 1) {
          const first = impact[0];
          const last = impact[impact.length - 1];
          const startHx = first.hx || 0;
          const currentHx = last.hx || 0;
          const startWb = first.wb || 0;
          const currentWb = last.wb || 0;
          const hxPct = startHx > 0 ? Math.round(currentHx / startHx * 100) : 0;
          const wbPct = startWb > 0 ? Math.round(currentWb / startWb * 100) : 0;
          const hxSold = startHx - currentHx;
          const wbSold = startWb - currentWb;
          impactHTML = `
            <div style="border-top:1px solid var(--navy-mid);padding-top:12px">
              <div style="color:var(--gold);font-weight:700;font-size:13px;margin-bottom:10px">Stock Movement Since Change</div>
              <div style="margin-bottom:10px">
                <div style="display:flex;justify-content:space-between;font-size:11px;margin-bottom:3px">
                  <span style="color:var(--gold);font-weight:600">HX Stock</span>
                  <span style="color:var(--text-muted)">${currentHx} remaining of ${startHx} (${hxSold} sold)</span>
                </div>
                <div style="background:var(--navy-mid);border-radius:6px;height:14px;overflow:hidden">
                  <div style="height:100%;width:${hxPct}%;background:var(--gold);border-radius:6px;transition:width 0.4s"></div>
                </div>
              </div>
              <div>
                <div style="display:flex;justify-content:space-between;font-size:11px;margin-bottom:3px">
                  <span style="color:var(--blue-light);font-weight:600">WB Stock</span>
                  <span style="color:var(--text-muted)">${currentWb} remaining of ${startWb} (${wbSold} sold)</span>
                </div>
                <div style="background:var(--navy-mid);border-radius:6px;height:14px;overflow:hidden">
                  <div style="height:100%;width:${wbPct}%;background:var(--blue-light);border-radius:6px;transition:width 0.4s"></div>
                </div>
              </div>
              <div style="font-size:10px;color:var(--text-muted);margin-top:6px">Since ${formatDate(first.recordedDate)} \u2192 ${formatDate(last.recordedDate)}</div>
            </div>
          `;
        } else {
          impactHTML = '<div class="no-history" style="margin-top:12px">Impact data will appear after more daily scrapes.</div>';
        }

        body.innerHTML = summaryHTML + historyHTML + impactHTML;
      } catch {
        overlay.querySelector(".modal-body").innerHTML = '<div class="no-history">Failed to load data.</div>';
      }
    }
    window.showPriceImpact = showPriceImpact;

    async function publishSnapshot() {
      const btn = document.getElementById("publish-btn");
      btn.disabled = true;
      btn.textContent = "Publishing...";
      try {
        const res = await fetch("/api/publish", { method: "POST" });

        if (data.error) throw new Error(data.error);
        alert("Published! View at:\\n" + data.url);

        btn.disabled = false;

    function downloadPDF() {
      const today = new Date().toISOString().split("T")[0];
      const element = document.getElementById("app");
      html2pdf()
        .set({
          margin: [10, 5, 10, 5],
          filename: `Market-View-${today}.pdf`,
          image: { type: "jpeg", quality: 0.95 },
          html2canvas: { scale: 2, useCORS: true, backgroundColor: "#001a30" },
          jsPDF: { unit: "mm", format: "a3", orientation: "landscape" },
          pagebreak: { mode: ["avoid-all", "css", "legacy"] },
        })
        .from(element)
        .save();
    }

    async function triggerScrape() {
      const btn = document.getElementById("scrape-btn");
      btn.disabled = true;
      btn.textContent = "Scraping...";

      // Add checklist container
      let checklist = document.getElementById("scrape-checklist");
      if (!checklist) {
        checklist = document.createElement("div");
        checklist.id = "scrape-checklist";
        checklist.className = "scrape-checklist";
        btn.parentElement.parentElement.insertBefore(checklist, btn.parentElement.nextSibling);
      }
      checklist.innerHTML = '<div style="color:var(--text-muted);padding:4px 0">Starting scrape...</div>';

      try {
        const res = await fetch("/api/scrape", { method: "POST" });
        const data = await res.json();
        if (data.status === "already_running") {
          btn.textContent = "Already Running...";
        }

        const poll = setInterval(async () => {
          try {
            const [statusRes, progressRes] = await Promise.all([
              fetch("/api/scrape-status"),
              fetch("/api/scrape-progress"),
            ]);
            const { running } = await statusRes.json();
            const progress = await progressRes.json();

            if (progress.length > 0) {
              checklist.innerHTML = progress.map(p => {
                const icons = {
                  pending: '<span class="icon">&#9675;</span>',
                  running: '<span class="icon spinner">&#9681;</span>',
                  done: '<span class="icon">&#10003;</span>',
                  failed: '<span class="icon">&#10007;</span>',
                };
                const extra = p.status === "done" && p.datesScraped !== undefined
                  ? ` <span style="color:var(--text-muted)">(${p.datesScraped} dates)</span>` : "";
                const errText = p.status === "failed" && p.error
                  ? ` <span style="color:#cf2e2e;font-size:11px">(failed)</span>` : "";
                return `<div class="scrape-checklist-item check-${p.status}">${icons[p.status] || icons.pending} ${p.name}${extra}${errText}</div>`;
              }).join("");
            }

            if (!running) {
              clearInterval(poll);
              btn.disabled = false;
              btn.textContent = "Refresh Data";
              setTimeout(() => { if (checklist) checklist.remove(); }, 5000);
              loadData();
            }
          } catch {}
        }, 2000);
      } catch (err) {
        btn.disabled = false;
        btn.textContent = "Refresh Data";
        if (checklist) checklist.remove();
      }
    }

    window.triggerScrape = triggerScrape;

    async function checkHXStatus() {
      try {
        const res = await fetch("/api/hx-status");
        const data = await res.json();
        updateHXButton(data);
      } catch {
        updateHXButton({ connected: false, valid: false });
      }

    function updateHXButton(data) {
      const btn = document.getElementById("hx-btn");
      if (!btn) return;
      if (data.connected && data.valid) {
        btn.style.background = "var(--teal)";
        btn.style.color = "#000";
        btn.textContent = "HX Connected";
        btn.disabled = false;
      } else if (data.connected && !data.valid) {
        btn.style.background = "#ff6900";
        btn.style.color = "#000";
        btn.textContent = "HX Expired - Reconnect";
        btn.disabled = false;
      } else {
        btn.style.background = "#cf2e2e";
        btn.style.color = "#fff";
        btn.textContent = "Connect HX";
        btn.disabled = false;
      }
    }

    async function showHXModal() {
      const btn = document.getElementById("hx-btn");
      btn.disabled = true;
      btn.textContent = "Opening browser...";
      btn.style.background = "var(--gold)";
      btn.style.color = "#000";

      try {
        const res = await fetch("/api/hx-login", { method: "POST" });
        const data = await res.json();
        if (data.status === "already_running") {
          btn.textContent = "Sign in in browser...";
          return;
        }

        btn.textContent = "Sign in in browser...";

        // Poll until login is complete
        const poll = setInterval(async () => {
          const statusRes = await fetch("/api/hx-login-status");
          const { running } = await statusRes.json();
          if (!running) {
            clearInterval(poll);
            checkHXStatus();
          }
        }, 2000);
      } catch {
        btn.disabled = false;
        btn.textContent = "Connect HX";
        btn.style.background = "#cf2e2e";
        btn.style.color = "#fff";
      }
    }
    window.showHXModal = showHXModal;

    async function loadData() {
      try {
        const [overviewRes, updatedRes] = await Promise.all([
          fetch("/api/overview"),
          fetch("/api/last-updated")
        ]);
        const overview = await overviewRes.json();
        const { lastUpdated } = await updatedRes.json();
        render(overview, lastUpdated);
      } catch (err) {
        document.getElementById("app").innerHTML =
          '<div class="hero-banner"><div class="error">Could not load data. Is the server running?</div></div>';
      }
    }

    loadData().then(() => checkHXStatus());
    setInterval(loadData, 5 * 60 * 1000);

    // --- Date detail modal ---
    const SOURCE_LABELS = {
      wb: "WB Direct",
      hx: "HX (Your Stock)",
      golden: "Golden Tours",
      booking: "Booking.com",
      premium: "Premium Tours",
      gyg: "GetYourGuide"
    };
    const SOURCE_COLORS = {
      wb: "#cf2e2e",
      hx: "#66bbb0",
      golden: "#f6bd49",
      booking: "#8cd0e5",
      premium: "#9b51e0",
      gyg: "#ff5533"
    };

    async function openDateModal(dateStr) {
      const dateLabel = new Date(dateStr + "T00:00:00").toLocaleDateString("en-GB", {
        weekday: "long", day: "numeric", month: "long", year: "numeric"
      });

      // Create overlay
      const overlay = document.createElement("div");
      overlay.className = "modal-overlay";
      overlay.onclick = (e) => { if (e.target === overlay) overlay.remove(); };

      overlay.innerHTML = `
        <div class="modal">
          <div class="modal-header">
            <h2>${dateLabel}</h2>
            <button class="modal-close" onclick="this.closest('.modal-overlay').remove()">&times;</button>
          </div>
          <div class="modal-body">
            <div class="no-history">Loading history...</div>
          </div>
        </div>
      `;
      document.body.appendChild(overlay);

      // Close on Escape
      const escHandler = (e) => {
        if (e.key === "Escape") { overlay.remove(); document.removeEventListener("keydown", escHandler); }
      };
      document.addEventListener("keydown", escHandler);

      // Fetch history
      try {
        const history = window.__STATIC_MODE__
          ? (window.__STATIC_DATA__.dateHistory[dateStr] || [])
          : await fetch("/api/date-history/" + dateStr).then(r => r.json());
        renderModal(overlay.querySelector(".modal-body"), dateStr, history);
      } catch (err) {
        overlay.querySelector(".modal-body").innerHTML =
          '<div class="no-history">Failed to load history.</div>';
      }
    }
    window.openDateModal = openDateModal;

    function renderModal(container, dateStr, history) {
      if (history.length === 0) {
        container.innerHTML = '<div class="no-history">No history yet for this date. Data will build up over daily scrapes.</div>';
        return;
      }

      // Group by recorded_date
      const byDay = new Map();
      for (const h of history) {
        if (!byDay.has(h.recordedDate)) byDay.set(h.recordedDate, {});
        byDay.get(h.recordedDate)[h.source] = h.tickets;
      }
      const days = Array.from(byDay.keys()).sort();

      // Find which sources have ticket data (wb/hx) vs status data (golden/booking/premium)
      const ticketSources = ["wb", "hx"];
      const statusSources = ["golden", "booking", "premium", "gyg"];

      // Build events list (competitor status changes)
      const events = [];
      let prevStatus = {};
      for (const day of days) {
        const data = byDay.get(day);
        for (const src of statusSources) {
          if (data[src] !== undefined) {
            const prev = prevStatus[src];
            if (prev !== undefined && prev !== data[src]) {
              const dayLabel = new Date(day + "T00:00:00").toLocaleDateString("en-GB", { day: "numeric", month: "short" });
              if (data[src] === 0) {
                events.push({ day, dayLabel, source: src, type: "sold-out", text: SOURCE_LABELS[src] + " sold out" });
              } else {
                events.push({ day, dayLabel, source: src, type: "back", text: SOURCE_LABELS[src] + " back in stock" });
              }
            }
            prevStatus[src] = data[src];
          }
        }
      }

      // Chart
      const chartHTML = `
        <div class="chart-container">
          <canvas id="history-chart"></canvas>
          <div class="chart-legend">
            <span><span class="legend-dot" style="background:${SOURCE_COLORS.hx}"></span> HX (Your Stock)</span>
            <span><span class="legend-dot" style="background:${SOURCE_COLORS.wb}"></span> WB Direct</span>
          </div>
        </div>
      `;

      const eventsHTML = events.length > 0 ? `
        <div class="events-title">Key Events</div>
        <ul class="event-list">
          ${events.map(e => `
            <li>
              <span class="event-date-label">${e.dayLabel}</span>
              <span class="event-badge ${e.type}">${e.type === "sold-out" ? "Sold Out" : "Available"}</span>
              <span>${e.text}</span>
            </li>
          `).join("")}
        </ul>
      ` : (days.length <= 1 ? '<div class="no-history">Only one data point so far. Trends will appear after more daily scrapes.</div>' : "");

      container.innerHTML = chartHTML + eventsHTML;

      // Draw chart
      drawChart(document.getElementById("history-chart"), days, byDay, ticketSources);
    }

    function drawChart(canvas, days, byDay, sources) {
      const dpr = window.devicePixelRatio || 1;
      const rect = canvas.parentElement.getBoundingClientRect();
      const W = rect.width - 32;
      const H = 250;
      canvas.width = W * dpr;
      canvas.height = H * dpr;
      canvas.style.width = W + "px";
      canvas.style.height = H + "px";

      const ctx = canvas.getContext("2d");
      ctx.scale(dpr, dpr);

      const padL = 50, padR = 20, padT = 20, padB = 40;
      const chartW = W - padL - padR;
      const chartH = H - padT - padB;

      // Find max value
      let maxVal = 10;
      for (const day of days) {
        const data = byDay.get(day);
        for (const src of sources) {
          if (data[src] !== undefined && data[src] > maxVal) maxVal = data[src];
        }
      }
      maxVal = Math.ceil(maxVal / 10) * 10; // Round up to nearest 10

      // Grid
      ctx.strokeStyle = "rgba(0,87,137,0.15)";
      ctx.lineWidth = 1;
      const gridLines = 5;
      for (let i = 0; i <= gridLines; i++) {
        const y = padT + (chartH / gridLines) * i;
        ctx.beginPath();
        ctx.moveTo(padL, y);
        ctx.lineTo(padL + chartW, y);
        ctx.stroke();

        // Y labels
        const val = Math.round(maxVal - (maxVal / gridLines) * i);
        ctx.fillStyle = "#7a9bb5";
        ctx.font = "11px Lora, serif";
        ctx.textAlign = "right";
        ctx.fillText(val.toString(), padL - 8, y + 4);
      }

      // X labels
      ctx.textAlign = "center";
      const step = Math.max(1, Math.floor(days.length / 8));
      for (let i = 0; i < days.length; i += step) {
        const x = padL + (chartW / Math.max(days.length - 1, 1)) * i;
        const label = new Date(days[i] + "T00:00:00").toLocaleDateString("en-GB", { day: "numeric", month: "short" });
        ctx.fillStyle = "#7a9bb5";
        ctx.fillText(label, x, H - 8);
      }

      // Draw lines
      for (const src of sources) {
        const color = SOURCE_COLORS[src];
        const points = [];
        for (let i = 0; i < days.length; i++) {
          const data = byDay.get(days[i]);
          if (data[src] !== undefined) {
            const x = padL + (chartW / Math.max(days.length - 1, 1)) * i;
            const y = padT + chartH - (data[src] / maxVal) * chartH;
            points.push({ x, y, val: data[src] });
          }
        }

        if (points.length === 0) continue;

        // Fill area
        ctx.beginPath();
        ctx.moveTo(points[0].x, padT + chartH);
        for (const p of points) ctx.lineTo(p.x, p.y);
        ctx.lineTo(points[points.length - 1].x, padT + chartH);
        ctx.closePath();
        ctx.fillStyle = color + "15";
        ctx.fill();

        // Line
        ctx.beginPath();
        ctx.moveTo(points[0].x, points[0].y);
        for (let i = 1; i < points.length; i++) {
          ctx.lineTo(points[i].x, points[i].y);
        }
        ctx.strokeStyle = color;
        ctx.lineWidth = 2.5;
        ctx.stroke();

        // Points
        for (const p of points) {
          ctx.beginPath();
          ctx.arc(p.x, p.y, 4, 0, Math.PI * 2);
          ctx.fillStyle = color;
          ctx.fill();
          ctx.beginPath();
          ctx.arc(p.x, p.y, 2, 0, Math.PI * 2);
          ctx.fillStyle = "#001a30";
          ctx.fill();
        }

        // Value labels on points (if not too many)
        if (points.length <= 14) {
          ctx.font = "10px Lora, serif";
          ctx.fillStyle = color;
          ctx.textAlign = "center";
          for (const p of points) {
            ctx.fillText(p.val.toString(), p.x, p.y - 10);
          }
        }
      }
    }
  </script>
</body>
</html>
